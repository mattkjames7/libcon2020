name: "Build and Test"

on: 
  pull_request:
  workflow_dispatch:
    inputs:
      build_target:
        description: "Which job to run"
        type: choice
        required: true
        default: all
        options:
          - all
          - linux
          - windows-mingw
          - windows-msvc
          - macos
  schedule:
    - cron: '0 0 1 * *'  # Runs at midnight UTC on the 1st of every month

run-name: "Build and Test Library"

jobs:
  build_linux:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'linux' }}
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout current branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.ref }}
      
      - name: Install build requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Build Library
        run: |
          cmake -S . -B build -G Ninja -DENABLE_TESTS=ON -DCMAKE_INSTALL_PREFIX="$PWD/install"
          cmake --build build -j$(nproc)

      - name: Run Tests
        run: |
          ctest --output-on-failure --test-dir build -j$(nproc)
        
      - name: Install Library
        run: cmake --install build

      - name: Build and Run Examples
        run: |
          gcc examples/cexample.c -I"$PWD/install/include" -L"$PWD/install/lib" -lcon2020 -o build/cexample
          g++ examples/cppexample.cc -I"$PWD/install/include" -L"$PWD/install/lib" -lcon2020 -o build/cppexample
          LD_LIBRARY_PATH="$PWD/install/lib:$LD_LIBRARY_PATH" ./build/cexample
          LD_LIBRARY_PATH="$PWD/install/lib:$LD_LIBRARY_PATH" ./build/cppexample


  build_windows:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'windows-mingw' }}
    runs-on: "windows-latest"
    steps:
      - name: Checkout current branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.ref }}
      
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Build (Ninja in MSYS2 shell)
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja -DENABLE_TESTS=ON -DCMAKE_INSTALL_PREFIX="C:/spline/install"
          cmake --build build -j$(nproc)

      - name: Run Tests (MSYS2 shell)
        shell: msys2 {0}
        run: |
          export PATH="$PWD/build/lib:$PWD/build/bin:$PATH"
          ctest --output-on-failure --test-dir build -j$(nproc)
          
      - name: Install (MSYS2 shell)
        shell: msys2 {0}
        run: cmake --install build

      - name: Build and Run Examples (MSYS2 shell)
        shell: msys2 {0}
        run: |
          gcc examples/cexample.c -I/c/spline/install/include -L/c/spline/install/lib -lcon2020 -o build/cexample.exe
          g++ examples/cppexample.cc -I/c/spline/install/include -L/c/spline/install/lib -lcon2020 -o build/cppexample.exe
          export PATH="/c/spline/install/bin:$PATH"
          ./build/cexample.exe
          ./build/cppexample.exe


  build_windows_msvc:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'windows-msvc' }}
    runs-on: "windows-latest"
    steps:
      - name: Checkout current branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Install ZLIB (vcpkg)
        shell: pwsh
        run: |
          $vcpkgExe = $null
          if ($env:VCPKG_ROOT -and (Test-Path "$env:VCPKG_ROOT/vcpkg.exe")) {
            $vcpkgExe = "$env:VCPKG_ROOT/vcpkg.exe"
          } else {
            $cmd = Get-Command vcpkg -ErrorAction SilentlyContinue
            if ($cmd) {
              $vcpkgExe = $cmd.Source
            }
          }

          if (-not $vcpkgExe) {
            throw "vcpkg executable not found on PATH and VCPKG_ROOT is not set"
          }

          $resolvedRoot = Split-Path -Parent $vcpkgExe
          "VCPKG_ROOT=$resolvedRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $vcpkgExe install zlib:x64-windows

      - name: Build Library (MSVC)
        shell: pwsh
        run: |
          $toolchain = "$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          if (-not (Test-Path $toolchain)) {
            throw "vcpkg toolchain file not found at: $toolchain"
          }
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DENABLE_TESTS=ON -DCMAKE_INSTALL_PREFIX="$PWD/install" -DCMAKE_TOOLCHAIN_FILE="$toolchain" -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build build --config Release --parallel

      - name: Run Tests (MSVC)
        shell: pwsh
        run: |
          ctest --output-on-failure --test-dir build -C Release --parallel

      - name: Install Library (MSVC)
        shell: pwsh
        run: cmake --install build --config Release

      - name: Build and Run Examples (MSVC)
        shell: pwsh
        run: |
          $exampleSrc = "$PWD/build/examples_msvc_src"
          $exampleBuild = "$PWD/build/examples_msvc_build"
          New-Item -ItemType Directory -Force -Path $exampleSrc | Out-Null
          @"
          cmake_minimum_required(VERSION 3.10)
          project(con2020_examples C CXX)

          add_executable(cexample "${CMAKE_SOURCE_DIR}/../../examples/cexample.c")
          target_include_directories(cexample PRIVATE "${CMAKE_SOURCE_DIR}/../../install/include")
          target_link_directories(cexample PRIVATE "${CMAKE_SOURCE_DIR}/../../install/lib")
          target_link_libraries(cexample PRIVATE con2020)

          add_executable(cppexample "${CMAKE_SOURCE_DIR}/../../examples/cppexample.cc")
          target_include_directories(cppexample PRIVATE "${CMAKE_SOURCE_DIR}/../../install/include")
          target_link_directories(cppexample PRIVATE "${CMAKE_SOURCE_DIR}/../../install/lib")
          target_link_libraries(cppexample PRIVATE con2020)
          "@ | Set-Content -Path "$exampleSrc/CMakeLists.txt"

          cmake -S "$exampleSrc" -B "$exampleBuild" -G "Visual Studio 17 2022" -A x64
          cmake --build "$exampleBuild" --config Release --parallel
          $env:PATH = "$PWD/install/bin;$env:PATH"
          & "$exampleBuild/Release/cexample.exe"
          & "$exampleBuild/Release/cppexample.exe"


  build_macos:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'macos' }}
    runs-on: "macos-latest"
    steps:
      - name: Checkout current branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.ref }}
      
      - name: Install Dependencies
        run: |
          brew update
          brew install cmake ninja

      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DENABLE_TESTS=ON -DCMAKE_INSTALL_PREFIX="$PWD/install"
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run Tests
        run: |
          ctest --output-on-failure --test-dir build -j$(nproc)
        
      - name: Install
        run: cmake --install build

      - name: Build and Run Examples
        run: |
          cc examples/cexample.c -I"$PWD/install/include" -L"$PWD/install/lib" -lcon2020 -o build/cexample
          c++ examples/cppexample.cc -I"$PWD/install/include" -L"$PWD/install/lib" -lcon2020 -o build/cppexample
          DYLD_LIBRARY_PATH="$PWD/install/lib:$DYLD_LIBRARY_PATH" ./build/cexample
          DYLD_LIBRARY_PATH="$PWD/install/lib:$DYLD_LIBRARY_PATH" ./build/cppexample

